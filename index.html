<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coffee Spark - طلب العميل</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <!-- استيراد مكتبات فايربيس بطريقة التوافق المباشر مع المتصفح -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap');
        body { font-family: 'Tajawal', sans-serif; background-color: #fdfaf7; color: #3c2a21; }
        .premium-shadow { box-shadow: 0 20px 50px rgba(60, 42, 33, 0.05); }
        .menu-item { transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .menu-item.selected { transform: scale(0.95); border-color: #d4a373; background-color: #fff9f0; border-width: 2px; }
        .progress-bar { transition: width 1s ease-in-out; }
        .chat-msg { max-width: 85%; animation: slideUp 0.3s ease-out; margin-bottom: 8px; }
        @keyframes slideUp { from { transform: translateY(10px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    </style>
</head>
<body class="min-h-screen pb-10">

    <div class="bg-[#3c2a21] text-white px-6 py-10 rounded-b-[3.5rem] mb-8 shadow-2xl relative overflow-hidden">
        <div class="relative z-10">
            <h1 class="text-3xl font-900 tracking-tighter">COFFEE SPARK</h1>
            <p class="text-xs opacity-60 mt-1 italic">Experience the art of coffee</p>
        </div>
        <div class="absolute -right-10 -bottom-10 opacity-10 text-[150px] rotate-12">
            <i class="fas fa-mug-hot"></i>
        </div>
    </div>

    <main class="max-w-md mx-auto px-5">
        <div id="phase-order" class="space-y-6">
            <div class="bg-white rounded-[2.5rem] p-6 premium-shadow border border-stone-100">
                <label class="text-[10px] font-bold text-stone-400 block mb-2 px-2 uppercase tracking-widest">رقم الطاولة</label>
                <input type="number" id="cust-table" placeholder="أدخل رقم طاولتك" 
                    class="w-full bg-stone-50 border-none rounded-2xl p-4 text-xl font-bold text-center focus:ring-2 focus:ring-[#d4a373] outline-none">
            </div>

            <div class="flex items-center justify-between px-2">
                <h3 class="font-900 text-lg text-stone-800">المنيو المفضل</h3>
                <span class="text-[10px] bg-stone-100 px-3 py-1 rounded-full text-stone-500">طازج يومياً</span>
            </div>

            <div class="grid grid-cols-2 gap-4" id="menu-grid"></div>

            <button id="submit-order" disabled class="w-full bg-stone-200 text-stone-400 py-5 rounded-[2rem] font-black text-lg transition-all shadow-lg active:scale-95 flex items-center justify-center gap-3">
                إرسال الطلب
                <i class="fas fa-paper-plane text-sm"></i>
            </button>
        </div>

        <div id="phase-tracking" class="hidden space-y-6">
            <div class="bg-white rounded-[2.5rem] p-8 premium-shadow text-center">
                <div class="text-xs text-stone-400 mb-6 font-bold uppercase">حالة الطلب المباشرة</div>
                <div class="relative py-4">
                    <div class="flex justify-between mb-8 relative z-10">
                        <div id="step-received" class="flex flex-col items-center gap-2 opacity-20">
                            <div class="w-12 h-12 bg-white rounded-2xl shadow-md flex items-center justify-center text-xl border border-stone-100"><i class="fas fa-receipt"></i></div>
                            <span class="text-[10px] font-bold">استلام</span>
                        </div>
                        <div id="step-preparing" class="flex flex-col items-center gap-2 opacity-20">
                            <div class="w-12 h-12 bg-white rounded-2xl shadow-md flex items-center justify-center text-xl border border-stone-100"><i class="fas fa-fire-burner"></i></div>
                            <span class="text-[10px] font-bold">تحضير</span>
                        </div>
                        <div id="step-delivering" class="flex flex-col items-center gap-2 opacity-20">
                            <div class="w-12 h-12 bg-white rounded-2xl shadow-md flex items-center justify-center text-xl border border-stone-100"><i class="fas fa-moped"></i></div>
                            <span class="text-[10px] font-bold">توصيل</span>
                        </div>
                    </div>
                    <div class="absolute top-10 left-0 w-full h-1 bg-stone-100 -z-0 rounded-full">
                        <div id="progress-line" class="h-full bg-[#d4a373] progress-bar w-0 rounded-full"></div>
                    </div>
                </div>
                <p id="status-text" class="text-sm font-bold text-[#d4a373] mt-4 animate-pulse">جاري تأكيد طلبك...</p>
            </div>

            <div class="bg-white rounded-[2.5rem] p-6 premium-shadow border border-stone-100 flex flex-col h-[350px]">
                <div class="flex items-center justify-between mb-4 border-b pb-4">
                    <h4 class="font-900 text-sm">دردشة الطاولة</h4>
                    <span class="w-2 h-2 bg-green-500 rounded-full animate-ping"></span>
                </div>
                <div id="chat-box" class="flex-1 overflow-y-auto space-y-3 px-2 mb-4 flex flex-col"></div>
                <div class="flex gap-2">
                    <input type="text" id="chat-input" placeholder="اكتب استفسارك..." 
                        class="flex-1 bg-stone-50 border-none rounded-2xl px-5 py-3 text-xs outline-none focus:ring-1 focus:ring-[#d4a373]">
                    <button id="btn-send-chat" class="bg-[#3c2a21] text-white w-12 h-12 rounded-2xl shadow-lg active:scale-90 transition-all">
                        <i class="fas fa-location-arrow -rotate-45"></i>
                    </button>
                </div>
            </div>
        </div>
    </main>

    <script>
        // إعدادات فايربيس
        const firebaseConfig = JSON.parse(__firebase_config);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'spark-v5';
        
        // بدء التشغيل
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        let currentUser = null;
        let selectedItems = [];
        const MENU = [
            { name: 'لاتيه بارد', icon: '🧊', price: 65 },
            { name: 'كابتشينو', icon: '☕', price: 55 },
            { name: 'كريب نوتيلا', icon: '🍫', price: 90 },
            { name: 'فرابيه كراميل', icon: '🥤', price: 75 }
        ];

        // تسجيل الدخول
        auth.signInAnonymously().catch(err => console.error("Auth Failed", err));

        auth.onAuthStateChanged(user => {
            if(user) {
                currentUser = user;
                renderMenu();
            }
        });

        function renderMenu() {
            const grid = document.getElementById('menu-grid');
            grid.innerHTML = '';
            MENU.forEach(item => {
                const el = document.createElement('div');
                el.className = 'menu-item bg-white p-6 rounded-[2.5rem] text-center border border-stone-100 premium-shadow cursor-pointer';
                el.innerHTML = `
                    <div class="text-3xl mb-2">${item.icon}</div>
                    <div class="font-bold text-xs">${item.name}</div>
                    <div class="text-[9px] text-stone-400 mt-1">${item.price} ج.م</div>
                `;
                el.onclick = () => {
                    el.classList.toggle('selected');
                    if(selectedItems.includes(item.name)) selectedItems = selectedItems.filter(i => i !== item.name);
                    else selectedItems.push(item.name);
                    validate();
                };
                grid.appendChild(el);
            });
        }

        function validate() {
            const btn = document.getElementById('submit-order');
            const table = document.getElementById('cust-table').value;
            if(selectedItems.length > 0 && table) {
                btn.disabled = false;
                btn.className = btn.className.replace('bg-stone-200 text-stone-400', 'bg-[#3c2a21] text-white');
            } else {
                btn.disabled = true;
                btn.className = btn.className.replace('bg-[#3c2a21] text-white', 'bg-stone-200 text-stone-400');
            }
        }
        document.getElementById('cust-table').addEventListener('input', validate);

        document.getElementById('submit-order').onclick = async () => {
            if(!currentUser) return;
            const table = document.getElementById('cust-table').value;
            const btn = document.getElementById('submit-order');
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> جاري الإرسال';
            
            try {
                const orderRef = await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('orders').add({
                    table, items: selectedItems, status: 'received', timestamp: firebase.firestore.FieldValue.serverTimestamp(), uid: currentUser.uid
                });

                document.getElementById('phase-order').classList.add('hidden');
                document.getElementById('phase-tracking').classList.remove('hidden');
                
                trackStatus(orderRef.id);
                initChat(orderRef.id);
            } catch (e) {
                btn.innerHTML = 'خطأ! حاول ثانية';
                console.error(e);
            }
        };

        function trackStatus(orderId) {
            db.collection('artifacts').doc(appId).collection('public').doc('data').collection('orders').doc(orderId)
                .onSnapshot(snap => {
                    const data = snap.data();
                    if(!data) return;
                    const steps = { received: 'step-received', preparing: 'step-preparing', delivering: 'step-delivering' };
                    const lines = { received: '5%', preparing: '50%', delivering: '100%' };
                    const texts = { received: 'تم استلام طلبك', preparing: 'جاري تحضير القهوة', delivering: 'الطلب في الطريق!' };

                    ['step-received', 'step-preparing', 'step-delivering'].forEach(s => document.getElementById(s).style.opacity = '0.2');
                    if(steps[data.status]) {
                        document.getElementById(steps[data.status]).style.opacity = '1';
                        document.getElementById('progress-line').style.width = lines[data.status];
                        document.getElementById('status-text').innerText = texts[data.status];
                    }
                });
        }

        function initChat(orderId) {
            const chatCol = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('chats').doc(orderId).collection('messages');
            
            chatCol.orderBy('timestamp').onSnapshot(snap => {
                const box = document.getElementById('chat-box');
                box.innerHTML = '';
                snap.forEach(d => {
                    const m = d.data();
                    const isCust = m.sender === 'customer';
                    const el = document.createElement('div');
                    el.className = `chat-msg p-3 rounded-2xl text-[11px] ${isCust ? 'bg-[#d4a373] text-white self-start' : 'bg-stone-100 text-stone-800 self-end'}`;
                    el.innerText = m.text;
                    box.appendChild(el);
                });
                box.scrollTop = box.scrollHeight;
            });

            document.getElementById('btn-send-chat').onclick = () => {
                const input = document.getElementById('chat-input');
                if(!input.value) return;
                chatCol.add({ text: input.value, sender: 'customer', timestamp: firebase.firestore.FieldValue.serverTimestamp() });
                input.value = '';
            };
        }
    </script>
</body>
</html>
